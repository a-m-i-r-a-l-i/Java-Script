<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter - JavaScript</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="counter">
      <h1 class="counter_title">COUNTER</h1>
      <span class="counter_value">0</span>
      <button class="counter_reset_button">↺</button>
      <div class="counter_buttons">
        <button class="counter_button--decrease">-</button>
        <button class="counter_button--increase">+</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
